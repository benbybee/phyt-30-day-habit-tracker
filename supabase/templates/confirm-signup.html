<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="x-apple-disable-message-reformatting" />
  </head>
  <body style="margin: 0; padding: 0; background-color: #f4f4f4;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color: #f4f4f4;">
      <tr>
        <td align="center" style="padding: 32px 16px;">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width: 480px; background-color: #ffffff; border-radius: 16px; border: 1px solid #ececec;">
            <tr>
              <td align="center" style="padding: 40px 40px 0 40px;">
                <img src="https://track.balanceofnature.com/bon-logo.png" alt="Balance of Nature" width="220" style="display: block; width: 220px; max-width: 60%; height: auto;" />
              </td>
            </tr>
            <tr>
              <td align="center" style="padding: 32px 40px 0 40px;">
                <h1 style="margin: 0; font-family: Arial, Helvetica, sans-serif; font-size: 22px; line-height: 1.3; font-weight: bold; color: #1a1a1a;">Confirm your email</h1>
              </td>
            </tr>
            <tr>
              <td align="center" style="padding: 12px 40px 0 40px;">
                <p style="margin: 0; font-family: Arial, Helvetica, sans-serif; font-size: 15px; line-height: 1.5; color: #555555;">Click below to confirm your account.</p>
              </td>
            </tr>
            <tr>
              <td align="center" style="padding: 28px 40px 0 40px;">
                <table role="presentation" cellpadding="0" cellspacing="0">
                  <tr>
                    <td style="border-radius: 999px; background-color: #8dc640;">
                      <a href="{{ .ConfirmationURL }}" style="display: inline-block; padding: 14px 32px; font-family: Arial, Helvetica, sans-serif; font-size: 15px; font-weight: bold; color: #0a2112; text-decoration: none; border-radius: 999px;">Confirm email</a>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td align="center" style="padding: 24px 40px 0 40px;">
                <p style="margin: 0; font-family: Arial, Helvetica, sans-serif; font-size: 12px; line-height: 1.5; color: #999999;">Or paste this link into your browser:<br /><a href="{{ .ConfirmationURL }}" style="color: #8dc640; word-break: break-all;">{{ .ConfirmationURL }}</a></p>
              </td>
            </tr>
            <tr>
              <td align="center" style="padding: 28px 40px 40px 40px;">
                <p style="margin: 0; font-family: Arial, Helvetica, sans-serif; font-size: 12px; line-height: 1.5; color: #999999;">If you didn't create an account, you can ignore this email.</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
